services:
  evolution_api:
    build:
      context: ./evolution-api
      dockerfile: Dockerfile
    container_name: evolution_api_bot
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=1303
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://root:root@db_bot:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis_bot:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
    depends_on:
      db_bot:
        condition: service_healthy
      redis_bot:
        condition: service_started
    networks:
      - bot_network

  db_bot:
    image: postgres:15-alpine
    container_name: db_bot
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=evolution
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bot_network

  redis_bot:
    image: redis:alpine
    container_name: redis_bot
    restart: always
    networks:
      - bot_network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_bot_libreria_v2
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge