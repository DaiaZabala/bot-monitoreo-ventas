services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_bot_libreria
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=tu_password_seguro # Cambiala si querés
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./n8n_data:/home/node/.n8n

  

  redis_bot:
    image: redis:alpine
    container_name: redis_bot
    restart: always

networks:
  default:
    name: n8n_network