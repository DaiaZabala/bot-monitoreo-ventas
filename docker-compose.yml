services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_bot_libreria_v2
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=tu_password_seguro
      - TZ=America/Argentina/Buenos_Aires
    volumes:
      - ./n8n_data:/home/node/.n8n

  evolution_api:
    build:
      context: ./evolution-api
      dockerfile: Dockerfile.fast
    container_name: evolution_api_bot
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=1303
      - DATABASE_TYPE=postgresql
      - DATABASE_CONNECTION_URI=postgresql://root:root@db_bot:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_HOST=redis_bot
      - CACHE_REDIS_PORT=6379
    depends_on:
      - redis_bot
      - db_bot

  # AGREGAMOS ESTE SERVICIO:
  db_bot:
    image: postgres:15-alpine
    container_name: db_bot
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=evolution
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis_bot:
    image: redis:alpine
    container_name: redis_bot
    restart: always

networks:
  default:
    name: n8n_network